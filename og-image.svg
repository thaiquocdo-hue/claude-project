<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#0b1d35"/>
<stop offset="60%" style="stop-color:#132d4f"/>
<stop offset="100%" style="stop-color:#0b1d35"/>
</linearGradient>
<linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#c9a96e"/>
<stop offset="100%" style="stop-color:#e4d5b7"/>
</linearGradient>
</defs>

<!-- Background -->
<rect width="1200" height="630" fill="url(#bg)"/>

<!-- Bottom gold bar -->
<rect y="622" width="1200" height="8" fill="url(#goldGrad)"/>

<!-- Subtle skyline silhouette at bottom -->
<g opacity="0.06" fill="white">
<rect x="0" y="520" width="60" height="110"/>
<rect x="70" y="480" width="45" height="150"/>
<rect x="125" y="500" width="55" height="130"/>
<rect x="190" y="440" width="70" height="190"/>
<rect x="270" y="460" width="50" height="170"/>
<rect x="330" y="410" width="80" height="220"/>
<rect x="420" y="450" width="60" height="180"/>
<rect x="490" y="380" width="90" height="250"/>
<rect x="590" y="420" width="55" height="210"/>
<rect x="655" y="360" width="100" height="270"/>
<rect x="765" y="400" width="65" height="230"/>
<rect x="840" y="430" width="50" height="200"/>
<rect x="900" y="370" width="85" height="260"/>
<rect x="995" y="410" width="60" height="220"/>
<rect x="1065" y="450" width="50" height="180"/>
<rect x="1125" y="470" width="75" height="160"/>
</g>

<!-- House silhouette icon (right side) -->
<g transform="translate(880, 280)">
<!-- House body -->
<rect x="30" y="80" width="180" height="120" rx="4" fill="none" stroke="#c9a96e" stroke-width="2" opacity="0.25"/>
<!-- Roof -->
<polygon points="120,20 10,90 230,90" fill="none" stroke="#c9a96e" stroke-width="2.5" stroke-linejoin="round" opacity="0.3"/>
<!-- Door -->
<rect x="95" y="130" width="50" height="70" rx="3" fill="#c9a96e" opacity="0.12"/>
<!-- Door knob -->
<circle cx="135" cy="168" r="4" fill="#c9a96e" opacity="0.25"/>
<!-- Left window -->
<rect x="48" y="108" width="35" height="30" rx="2" fill="#c9a96e" opacity="0.1"/>
<line x1="65.5" y1="108" x2="65.5" y2="138" stroke="#c9a96e" stroke-width="1" opacity="0.2"/>
<line x1="48" y1="123" x2="83" y2="123" stroke="#c9a96e" stroke-width="1" opacity="0.2"/>
<!-- Right window -->
<rect x="157" y="108" width="35" height="30" rx="2" fill="#c9a96e" opacity="0.1"/>
<line x1="174.5" y1="108" x2="174.5" y2="138" stroke="#c9a96e" stroke-width="1" opacity="0.2"/>
<line x1="157" y1="123" x2="192" y2="123" stroke="#c9a96e" stroke-width="1" opacity="0.2"/>
<!-- Chimney -->
<rect x="160" y="40" width="25" height="50" rx="2" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.2"/>
</g>

<!-- Tag line -->
<text x="80" y="180" font-family="Georgia,serif" font-size="14" fill="#c9a96e" letter-spacing="5">VANCOUVER REAL ESTATE</text>

<!-- Name -->
<text x="80" y="275" font-family="Georgia,serif" font-size="72" fill="white" font-weight="normal">Thai</text>
<text x="265" y="275" font-family="Georgia,serif" font-size="72" fill="#c9a96e" font-weight="normal">Do</text>

<!-- Title -->
<text x="80" y="330" font-family="Georgia,serif" font-size="22" fill="rgba(255,255,255,0.65)">Personal Real Estate Corporation</text>
<text x="80" y="365" font-family="Georgia,serif" font-size="22" fill="rgba(255,255,255,0.65)">RE/MAX Crest Realty &#8212; West Side</text>

<!-- Services -->
<text x="80" y="430" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" letter-spacing="1">Buy  &#8226;  Sell  &#8226;  Invest  &#8226;  Pre-Sale</text>

<!-- Phone badge -->
<rect x="860" y="150" width="280" height="100" rx="14" fill="rgba(201,169,110,0.1)" stroke="rgba(201,169,110,0.25)" stroke-width="1.5"/>
<text x="1000" y="192" font-family="Georgia,serif" font-size="28" fill="#c9a96e" text-anchor="middle" font-weight="bold">(604) 828-2901</text>
<text x="1000" y="222" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="3">CALL OR TEXT</text>

<!-- Website -->
<text x="80" y="560" font-family="Arial,sans-serif" font-size="18" fill="#c9a96e" letter-spacing="2" font-weight="bold">thaido.ca</text>
<text x="250" y="560" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.3)" letter-spacing="1">|  thai@thaido.ca</text>
</svg>
